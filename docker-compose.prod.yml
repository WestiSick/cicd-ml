# Prod override — Traefik reverse-proxy with automatic Let's Encrypt.
# Required env: DOMAIN, LE_EMAIL (see .env.prod.example).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${LE_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik-letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  api:
    build:
      target: prod
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`) || PathPrefix(`/webhooks`))
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=8080

  ml:
    build:
      # ml-service Dockerfile only has `prod` stage — same name as the
      # api-gateway's `prod` but different image (FastAPI vs Go bin).
      target: prod

  # NB: target names below MUST match the stages in
  # services/api-gateway/Dockerfile — `collector-prod` and
  # `simulator-prod` are distroless single-binary images. Without these
  # explicit overrides, the prod compose would inherit the base's
  # target (which is the same), but listing them makes the prod stack
  # self-documenting and prevents a future "target: prod" mistake from
  # silently rebuilding collector as api-gateway.
  collector:
    build:
      target: collector-prod

  simulator:
    build:
      target: simulator-prod

  frontend:
    build:
      target: prod
      args:
        VITE_API_BASE: ${VITE_API_BASE}
        VITE_WS_BASE: ${VITE_WS_BASE}
    labels:
      - traefik.enable=true
      - traefik.http.routers.front.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.front.entrypoints=websecure
      - traefik.http.routers.front.tls.certresolver=le
      - traefik.http.services.front.loadbalancer.server.port=80

volumes:
  traefik-letsencrypt:
