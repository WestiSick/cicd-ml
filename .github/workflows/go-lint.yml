name: go-lint

# Split out of the legacy `ci.yml` so each push fires four independent
# workflow_run webhooks — one per check. That makes the live queue on
# /dashboard interesting (4 cards per push, each with its own prediction
# and δ-error) and gives the dataset 4× as many job rows to train on.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: lint go (api-gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: services/api-gateway/go.sum
      - name: copy migrations into embed path
        run: |
          mkdir -p services/api-gateway/internal/store/migrations
          cp db/migrations/*.sql services/api-gateway/internal/store/migrations/
      - name: go build
        working-directory: services/api-gateway
        run: go build ./...
      - name: go vet
        working-directory: services/api-gateway
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: services/api-gateway
          args: --timeout=5m
