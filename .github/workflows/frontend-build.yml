name: frontend-build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: build
        working-directory: frontend
        run: npm run build
