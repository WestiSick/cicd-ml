name: ci

# Unified CI workflow — 4 parallel jobs (was 4 separate workflow files,
# each firing its own webhook). Consolidated back into one workflow so
# the GitHub Actions tab is less noisy and a single status check covers
# the whole build.
#
# Trade-off vs the previous "one workflow per language" setup: each push
# now produces ONE workflow_run webhook instead of four, so /dashboard's
# live queue shows one card per push instead of four. That's intentional
# — the four-cards-per-push trick was useful for the queue demo but
# polluted the prediction history with quasi-duplicates of the same SHA.
#
# Jobs run in parallel on independent runners; total wall time is
# bounded by the slowest of (go-lint, go-test, python-lint, frontend-
# build). Each job sets up its own toolchain (go / python / node) and
# uses the appropriate cache so cold-start cost is minimal.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  go-lint:
    name: lint go (api-gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: services/api-gateway/go.sum
      - name: copy migrations into embed path
        run: |
          mkdir -p services/api-gateway/internal/store/migrations
          cp db/migrations/*.sql services/api-gateway/internal/store/migrations/
      - name: go build
        working-directory: services/api-gateway
        run: go build ./...
      - name: go vet
        working-directory: services/api-gateway
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: services/api-gateway
          args: --timeout=5m

  go-test:
    name: test go (api-gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: services/api-gateway/go.sum
      - name: copy migrations into embed path
        run: |
          mkdir -p services/api-gateway/internal/store/migrations
          cp db/migrations/*.sql services/api-gateway/internal/store/migrations/
      - name: go test (race detector on)
        working-directory: services/api-gateway
        run: go test -race -count=1 ./...

  python-lint:
    name: lint python (ml-service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/ml-service/requirements.txt
      - name: install
        working-directory: services/ml-service
        run: pip install ruff
      - name: ruff
        working-directory: services/ml-service
        run: ruff check .

  frontend-build:
    name: build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: build
        working-directory: frontend
        run: npm run build
